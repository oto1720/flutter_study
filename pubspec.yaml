name: flutter_learn
description: 'Flutter Clean Architecture + Firebase Auth の学習プロジェクト'
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # --- Firebase ---
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1

  # --- 状態管理 ---
  # hooks_riverpod は flutter_riverpod + flutter_hooks を統合したパッケージ
  # HookConsumerWidget が使えるようになる
  hooks_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  flutter_hooks: ^0.20.5

  # --- ルーティング ---
  go_router: ^14.3.0

  # --- モデル / イミュータブル ---
  freezed_annotation: ^2.4.4

  # --- エラーハンドリング (Either) ---
  fpdart: ^1.1.0

  # --- HTTP クライアント ---
  # dio: 高機能HTTPクライアント（インターセプター・タイムアウト・リトライ対応）
  # retrofit: dio を使った型安全な REST API クライアント生成
  dio: ^5.7.0
  retrofit: '>=4.1.0 <4.9.0'
  # json_annotation: json_serializable の実行時依存
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # --- コード生成 ---
  build_runner: ^2.4.12
  freezed: ^2.5.7
  riverpod_generator: ^2.4.3
  retrofit_generator: ^9.7.0
  json_serializable: ^6.8.0

  # --- テスト ---
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
