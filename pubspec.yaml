name: flutter_learn
description: 'Flutter Clean Architecture + Firebase Auth の学習プロジェクト'
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # --- Firebase ---
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1

  # --- 状態管理 ---
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # --- ルーティング ---
  go_router: ^14.3.0

  # --- モデル / イミュータブル ---
  freezed_annotation: ^2.4.4

  # --- エラーハンドリング (Either) ---
  fpdart: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # --- コード生成 ---
  build_runner: ^2.4.12
  freezed: ^2.5.7
  riverpod_generator: ^2.4.3

  # --- テスト ---
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
